<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Auto redirect after 5 seconds -->
  <meta http-equiv="refresh" content="5;url=home.html">

  <title>Life on Land - SDG 15</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: url('images/main1.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    /* Overlay */
    .overlay {
      background: rgba(0, 0, 0, 0.6);
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
    }

    .mission {
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    /* Loader */
    .loader {
      width: 40px;
      height: 40px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top: 5px solid #8bc34a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 15px auto;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    /* Countdown */
    .countdown {
      margin: 10px 0;
    }

    /* Skip button */
    .skip-btn {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      background: #8bc34a;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .skip-btn:hover {
      background: #689f38;
    }

    /* Members */
    .members {
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .member-list {
      margin-top: 10px;
    }

    .member {
      display: inline-block;
      margin: 5px;
      padding: 6px 15px;
      border-radius: 20px;
      background-color: rgba(139, 195, 74, 0.2);
      border: 1px solid #8bc34a;
	  cursor: pointer;
    }

    .member:hover {
      background-color: #8bc34a;
      color: black;
    }

  </style>
</head>

<body>

  <div class="overlay">

    <!-- Title -->
    <h1>Life on Land (SDG 15)</h1>

    <!-- Mission -->
    <p class="mission">
      Protecting ecosystems and biodiversity through awareness and sustainable action.
    </p>

    <!-- Loader -->
    <div class="loader"></div>

    <!-- Countdown -->
    <p class="countdown">
      Entering site in <span id="count">5</span>
    </p>

    <!-- Skip Button -->
    <button class="skip-btn" onclick="skipIntro()">Skip Intro</button>

    <!-- Group Members -->
    <div class="members">
      <p><strong>Group Members:</strong></p>
      <div class="member-list">
        <span class="member">Loheeshan</span>
        <span class="member">Aakif</span>
        <span class="member">Lasidara</span>
        <span class="member">Lakshan</span>
      </div>
    </div>

  </div>

  <script>
    let timeLeft = 5;
    const countElement = document.getElementById("count");

    const timer = setInterval(() => {
      timeLeft--;
      if (timeLeft >= 0) {
        countElement.textContent = timeLeft;
      } else {
        clearInterval(timer);
      }
    }, 1000);

    function skipIntro() {
      window.location.href = "home.html";
    }
  </script>

</body>
</html>
